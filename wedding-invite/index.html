<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>दीप्ती ❀ आशीर्वाद — विवाह आमंत्रण</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Yatra+One&family=Eczar:wght@500;600;700&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root{
    --cream:#FFF8E7;
    --cream-deep:#FFE9B3;

    --night:#2B0A0A;

    --maroon:#B71C1C;
    --maroon-deep:#7F0000;

    --green:#1B5E20;

    --gold:#FFD700;
    --gold-light:#FFEB3B;

    --marigold-1:#FFC107;
    --marigold-2:#FF5722;

    --ink:#3A1E00;
}

  *{ box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
  html,body{ margin:0; padding:0; }

  body{
    font-family:'Hind', sans-serif;
   background: linear-gradient(
160deg,
#4A0404 0%,
#7F0000 45%,
#4A0404 100%
);
    color: var(--ink);
    overflow-x: hidden;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  }

  /* ---------- PETALS ---------- */
  .petal-field{
    position: fixed; inset:0; pointer-events:none; z-index: 5; overflow:hidden;
  }
  .petal{
    position:absolute; top:-40px;
    border-radius: 60% 0 60% 0;
    animation: fall linear infinite;
    opacity: 0.9;
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.25));
  }
  @keyframes fall{
    0%   { transform: translateY(0) translateX(0) rotate(0deg); }
    50%  { transform: translateY(55vh) translateX(var(--sway,18px)) rotate(180deg); }
    100% { transform: translateY(112vh) translateX(0) rotate(360deg); }
  }

  /* ---------- GATE ---------- */
  .gate{
    position: fixed; inset:0; z-index: 40;
    display:flex;
    transition: opacity 0.6s ease 0.9s;
  }
  .gate.opened{ opacity:0; pointer-events:none; }

  .gate-panel{
    flex:1; height:100%;
    background:
      radial-gradient(circle at 50% 18%, rgba(232,194,94,0.18), transparent 55%),
      linear-gradient(180deg, #3c1f17 0%, #2a1810 70%);
    border-right: 1px solid rgba(232,194,94,0.25);
    position: relative;
    transition: transform 1s cubic-bezier(.65,0,.35,1);
    display:flex; align-items:center; justify-content:center;
  }
  .gate-panel.right{ border-right:none; border-left: 1px solid rgba(232,194,94,0.25); }
  .gate.opened .gate-panel.left{ transform: translateX(-102%); }
  .gate.opened .gate-panel.right{ transform: translateX(102%); }

  .gate-panel svg.motif{ width: 70%; max-width: 220px; opacity: 0.55; }

  .gate-center{
    position:absolute; top:0; left:0; right:0; bottom:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index: 41; text-align:center; padding: 0 24px;
    transition: opacity 0.5s ease;
  }
  .gate.opened .gate-center{ opacity:0; pointer-events:none; }

  .gate-om{
    font-size: 46px; color: var(--gold-light);
    margin-bottom: 14px;
    animation: glow 2.6s ease-in-out infinite;
  }
  @keyframes glow{
    0%,100%{ text-shadow: 0 0 14px rgba(232,194,94,0.35); }
    50%{ text-shadow: 0 0 28px rgba(232,194,94,0.75); }
  }

  .gate-title{
    font-family:'Yatra One', serif;
    color: var(--cream);
    font-size: clamp(26px, 7vw, 38px);
    margin: 0 0 6px;
  }
  .gate-sub{
    color: #d8c6a8; font-size: 13.5px; letter-spacing: 1px; margin-bottom: 30px;
  }

  .open-btn{
    font-family:'Eczar', serif; font-weight:600; letter-spacing:1px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    color: #2a1810; border:none; border-radius: 999px;
    padding: 14px 34px; font-size: 16px; cursor:pointer;
    box-shadow: 0 8px 24px rgba(201,151,43,0.4);
    transition: transform 0.25s ease, box-shadow 0.25s ease;
  }
  .open-btn:hover{ transform: translateY(-2px) scale(1.03); box-shadow: 0 12px 30px rgba(201,151,43,0.55); }
  .open-btn:focus-visible{ outline: 3px solid var(--cream); outline-offset: 3px; }

  /* ---------- MAIN SCROLL CONTENT ---------- */
  .stage{
    min-height: 100vh;
    display:flex; justify-content:center;
    padding: 26px 14px 60px;
    position: relative; z-index: 2;
  }
  .card{
    width:100%; max-width: 640px;
    background:
      radial-gradient(circle at 10% 4%, rgba(201,151,43,0.12), transparent 45%),
      radial-gradient(circle at 92% 96%, rgba(124,22,38,0.08), transparent 50%),
      var(--cream);
    border: 1px solid var(--gold);
    border-radius: 10px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.45);
    position: relative; overflow:hidden;
    padding-bottom: 30px;
  }
  .frame-inner{
    position:absolute; inset:12px;
    border: 1px solid rgba(201,151,43,0.55);
    border-radius: 5px; pointer-events:none;
  }

  .reveal{
    opacity:0; transform: translateY(22px);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  .reveal.visible{ opacity:1; transform:translateY(0); }

  .garland{ width:100%; display:block; }

  .ganesh-line{
    text-align:center; color: var(--maroon-deep);
    font-family:'Eczar', serif; font-weight:600;
    font-size: clamp(16px, 3.6vw, 20px);
    margin: 10px 0 4px; letter-spacing: 0.5px;
  }
  .intro{
    text-align:center; color: var(--ink);
    font-size: clamp(13.5px, 3vw, 15px); line-height:1.85;
    max-width: 460px; margin: 14px auto 22px; padding: 0 28px;
  }

  .section-title{
    text-align:center; color: var(--green);
    font-family:'Eczar', serif; font-weight:700;
    font-size: clamp(14px, 3.4vw, 16.5px); letter-spacing: 2px;
    margin: 0 0 6px;
  }
  .flourish{
    display:flex; align-items:center; justify-content:center; gap:10px;
    margin: 18px auto; width: 80%; max-width: 360px;
  }
  .flourish .line{ flex:1; height:1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
  .flourish .glyph{ color: var(--gold); font-size: 13px; }

  .couple{ text-align:center; padding: 0 24px 8px; }
  .vadhu, .var{
    font-family:'Yatra One', serif; color: var(--maroon);
    font-size: clamp(24px, 6vw, 32px); line-height:1.3; margin:4px 0;
  }
  .designation{ font-family:'Hind', sans-serif; font-size:0.55em; color: var(--ink); font-weight:500; }
  .parents{ color: var(--ink); font-size: clamp(12.5px, 2.8vw, 14px); margin: 2px 0 14px; opacity:0.92; }
  .weds{
    font-family:'Eczar', serif; font-style:italic; color: var(--gold);
    font-size: clamp(15px, 3.5vw, 18px); margin: 4px 0 8px; letter-spacing: 3px;
  }

  /* ---------- COUNTDOWN ---------- */
  .countdown-wrap{ padding: 4px 24px 6px; text-align:center; }
  .countdown-label{ color: var(--gold); font-size: 12.5px; letter-spacing: 2px; margin-bottom: 10px; }
  .countdown{ display:flex; justify-content:center; gap: 10px; flex-wrap: wrap; }
  .cbox{
    background: var(--night); color: var(--cream);
    border-radius: 8px; padding: 10px 6px; min-width: 62px;
    box-shadow: inset 0 0 0 1px rgba(232,194,94,0.35);
  }
  .cbox .num{ font-family:'Eczar', serif; font-weight:700; font-size: clamp(18px, 4.4vw, 22px); display:block; }
  .cbox .unit{ font-size: 10px; letter-spacing: 1px; color: var(--gold-light); }

  /* ---------- TIMELINE ---------- */
  .timeline{ padding: 18px 26px 4px; }
  .tl-item{
    display:flex; gap:14px; align-items:flex-start; position:relative;
    padding-bottom: 22px;
  }
  .tl-item:not(:last-child)::before{
    content:""; position:absolute; left: 10px; top: 24px; bottom:-4px;
    width:1px; background: var(--gold-light);
  }
  .tl-dot{
    flex-shrink:0; width:21px; height:21px; border-radius:50%;
    background: radial-gradient(circle at 35% 30%, var(--marigold-1), var(--marigold-2));
    box-shadow: 0 0 0 3px var(--cream), 0 0 0 4px var(--gold-light);
    margin-top: 2px;
  }
  .tl-content b{ color: var(--maroon-deep); display:block; font-size: clamp(13.5px,3vw,15px); }
  .tl-content span{ color: var(--ink); font-size: clamp(12.5px,2.8vw,14px); }
  .note{ text-align:center; color: var(--gold); font-style: italic; font-size: clamp(12px, 2.7vw, 13.5px); margin: 4px 0 0; }

  /* ---------- VENUE ---------- */
  .venue-box{
    text-align:center;
    background: rgba(124,22,38,0.05);
    border-top: 1px solid var(--gold-light); border-bottom: 1px solid var(--gold-light);
    padding: 18px 28px; margin: 4px 0 22px;
  }
  .venue-name{ font-family:'Eczar', serif; font-weight:700; color: var(--maroon); font-size: clamp(17px,4vw,20px); margin:4px 0 6px; }
  .venue-address{ color: var(--ink); font-size: clamp(13px,2.9vw,14.5px); line-height:1.7; }
  .map-btn{
    display:inline-block; margin-top: 12px;
    font-size: 13px; font-weight:600; color: var(--cream);
    background: var(--green); padding: 9px 20px; border-radius: 999px;
    text-decoration:none; letter-spacing: 0.5px;
    transition: transform 0.2s ease;
  }
  .map-btn:hover{ transform: translateY(-2px); }

  /* ---------- HOST / SENDER ---------- */
  .host-section{ text-align:center; padding: 0 28px 18px; color: var(--ink); font-size: clamp(12.8px,2.8vw,14px); line-height:1.8; }
  .host-section .name-line{ font-weight:600; color: var(--maroon-deep); font-size: clamp(14px,3.1vw,15.5px); margin-bottom:4px; }
  .phone-line a{ color: var(--green); font-weight:600; text-decoration:none; }
  .phone-line a:hover{ text-decoration:underline; }

  .closing{
    text-align:center; color: var(--maroon); font-family:'Eczar', serif;
    font-weight:600; font-style:italic; font-size: clamp(13.5px,3vw,15.5px);
    line-height:1.8; padding: 6px 34px 4px;
  }
  .bottom-glyph{ text-align:center; color: var(--gold); font-size: 22px; margin: 14px 0 2px; }

  .credit{
    text-align:center; color: #d8c6a8; font-size: 11.5px; margin-top: 18px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="vendor/react.production.min.js"></script>
<script src="vendor/react-dom.production.min.js"></script>

<script src="app.js"></script>
</body>
</html>
